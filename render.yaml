# Render deployment configuration for SmartAttend
# Backend: FastAPI on free Web Service
# Database: Use Supabase PostgreSQL (external, free)

services:
  - type: web
    name: smartattend-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_DEFAULT_PASSWORD
        value: Admin@2024!
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
