# Nginx configuration for SmartAttend frontend
# Serves the React SPA and proxies API + student photo requests

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - all non-file routes serve index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Proxy auth, users, students, attendance, and other backend routes
    location ~ ^/(auth|users|students|attendance|sections|assignments|timetable|activity|analytics|notifications|static)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Proxy student photo requests to the institution's photo server
    location ~ ^/(ACOE|ACET|AEC|acoe|acet|aec)/StudentPhotos/ {
        proxy_pass https://info.aec.edu.in;
        proxy_set_header Host info.aec.edu.in;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
